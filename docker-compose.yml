version: "3.8"
services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - //d/workplace/mkagent:/app/storage
      - ./data:/app/data
    environment:
      - PYTHONUNBUFFERED=1
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=exaone3.5:7.8b
      - OLLAMA_EMBED_MODEL=bge-m3
      - STORAGE_PATH=/app/storage
      - DATA_PATH=/app/data
      - ADMIN_USER=admin
      - ADMIN_PASS=admin
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
